name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir dist
          cp target/release/lenocon-cli dist/
          cp target/release/lenocon-daemon dist/
          tar -czf lenocon-x86_64.tar.gz -C dist .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: lenocon-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
